<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: dark slate matching hero surface (#0F172A) -->
  <rect width="1200" height="630" fill="#0F172A"/>

  <!-- Subtle radial glow behind logo -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="46%" r="40%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo icon (split-arrow chevrons in blue circle) -->
  <circle cx="600" cy="220" r="80" fill="#2563EB"/>
  <path d="M560 220 L600 178 L640 220" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M560 220 L600 262 L640 220" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- App name -->
  <text x="600" y="360" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#FFFFFF">
    SplitTrip
  </text>

  <!-- Tagline -->
  <text x="600" y="420" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94A3B8">
    Split travel expenses with zero hassle
  </text>

  <!-- Feature pills row -->
  <!-- Pill 1: Multi-currency -->
  <rect x="215" y="470" width="210" height="42" rx="21" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="240" cy="491" r="6" fill="#2563EB"/>
  <text x="255" y="497" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#CBD5E1">Multi-currency</text>

  <!-- Pill 2: Real-time balances -->
  <rect x="445" y="470" width="220" height="42" rx="21" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="470" cy="491" r="6" fill="#10B981"/>
  <text x="485" y="497" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#CBD5E1">Real-time balances</text>

  <!-- Pill 3: Minimum repayments -->
  <rect x="685" y="470" width="240" height="42" rx="21" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="710" cy="491" r="6" fill="#7C3AED"/>
  <text x="725" y="497" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#CBD5E1">Minimum repayments</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="#2563EB"/>
</svg>
